idea:
  title: Detect different lies
  domain: nlp
  hypothesis: 'Current lie-detection methods for LLMs are limited by datasets that
    do not cleanly separate types of false outputs (such as hallucination, confabulation,
    and strategic deception), making it unclear what mechanisms detectors are identifying.
    Investigating how often LLM false statements are due to epistemic failure versus
    incentive-driven misreporting will clarify the effectiveness and specificity of
    lie-detection approaches.

    '
  background:
    description: "The literature already proposes several distinctions between types\
      \ of false outputs (e.g., hallucination, confabulation, strategic deception).\
      \ However, current lie\u2011detection methods often evaluate detectors on datasets\
      \ that do not cleanly separate these mechanisms, which makes it difficult to\
      \ know what the detector is actually detecting.\nWhen LLMs produce false statements,\
      \ how often are these due to epistemic failure versus incentive\u2011driven\
      \ misreporting?\n"
